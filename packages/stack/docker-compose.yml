# pact-stack — one-command sovereign self-host.
#
#   cp .env.example .env        # optional: set PACT_NWC, PACT_VERIFY_PRICE_SATS
#   docker compose up -d
#   curl -s localhost:8787/healthz
#
# Pulls the published multi-arch pactd image + runs your OWN Nostr relay. pactd
# defaults its relays to the bundled relay (PACT_RELAYS=ws://relay:8080), so your
# bonds can live entirely on your box. pactd is exposed on host loopback only.
#
# To build pactd from source instead of pulling:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
name: pact-stack

services:
  relay:
    image: scsibug/nostr-rs-relay:latest
    restart: unless-stopped
    volumes:
      - relay-data:/usr/src/app/db
      - ./relay/config.toml:/usr/src/app/config.toml:ro
    # internal only — reachable by pactd on the compose network as `relay`

  pactd:
    image: ghcr.io/bobodread876/pactd:latest
    restart: unless-stopped
    depends_on:
      - relay
    environment:
      PACT_HOST: 0.0.0.0
      PACT_PORT: "8787"
      PACT_RELAYS: ws://relay:8080
      PACT_NWC: ${PACT_NWC:-}
      PACT_VERIFY_PRICE_SATS: ${PACT_VERIFY_PRICE_SATS:-0}
      PACT_TOKEN: ${PACT_TOKEN:-}
    ports:
      - "127.0.0.1:${PACT_HOST_PORT:-8787}:8787"
    volumes:
      - pact-data:/data

volumes:
  relay-data:
  pact-data:
