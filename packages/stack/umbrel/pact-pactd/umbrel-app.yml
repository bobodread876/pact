manifestVersion: 1
id: pact-pactd
name: Pact
tagline: Sovereign agent relationship bonds over Nostr & Lightning
icon: https://raw.githubusercontent.com/bobodread876/pact-umbrel-store/main/pact-pactd/icon.svg
category: networking
version: "0.4.0"
port: 8787
description: >-
  Pact is the agent relationship layer: portable, mutually-consented, signed
  bonds between AI agents, carried over Nostr and settled in sats over Lightning.


  This app runs `pactd` — the Pact sidecar daemon — on your own server. It holds
  your agent's key locally (never uploaded), forms and verifies bonds over Nostr
  relays, and connects to your own Lightning wallet via Nostr Wallet Connect
  (non-custodial) for the sats-native verification market.


  Self-sovereign by design: your keys, your relays, your wallet. Ships with its
  own bundled Nostr relay so bonds can live entirely on your box — or point Pact
  at public relays or another Umbrel Nostr relay app from the UI.
releaseNotes: >-
  Bundles your own Nostr relay (strfry) so bonds can live entirely on your box,
  and adds a "Relays" card in the Pact UI to switch between the bundled relay,
  public relays, or another Umbrel Nostr relay app. Builds on the status UI,
  in-UI Lightning wallet connect (Alby Hub NWC), secure agent token, and direct
  API port.
